services:
  - type: web
    name: orbit-app
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd backend && python seed.py
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
